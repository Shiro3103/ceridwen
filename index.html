<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #0a0a0a, #000);
  color: white;
  text-align: center;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  font-size: 20px;
  letter-spacing: 2px;
}

.login {
  background: #6c4cff;
  border: none;
  padding: 8px 18px;
  border-radius: 10px;
  color: white;
}

/* TITLE */
h1 {
  margin-top: 40px;
  font-size: 50px;
  letter-spacing: 5px;
}

/* CARD */
.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 40px;
}

.card {
  background: #111;
  border-radius: 20px;
  padding: 20px;
  margin: 15px;
  width: 220px;
  box-shadow: 0 0 20px rgba(255,255,255,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 25px rgba(108,76,255,0.4);
}

.card img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

.card h3 {
  margin: 10px 0;
}

/* BUTTON */
button {
  margin: 5px;
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.view {
  background: white;
  color: black;
}

.fb {
  background: #1877f2;
  color: white;
}

/* PROFILE BOX */
.profile {
  display: none;
  margin: 30px auto;
  background: #111;
  padding: 20px;
  width: 300px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<header>
  <div class="logo">CERIDWEN</div>
  <button class="login">ล็อกอิน</button>
</header>

<h1>CERIDWEN</h1>

<div class="container">

  <!-- MEMBER 1 -->
  <div class="card">
    <img src="https://i.pravatar.cc/100?img=1">
    <h3>Bank</h3>
    <button class="view" onclick="showProfile('Bank','Leader','สายบุก ชอบลุย')">โปรไฟล์</button>
    <a href="https://facebook.com/" target="_blank">
      <button class="fb">Facebook</button>
    </a>
  </div>

  <!-- MEMBER 2 -->
  <div class="card">
    <img src="https://i.pravatar.cc/100?img=2">
    <h3>Mix</h3>
    <button class="view" onclick="showProfile('Mix','Support','สายซัพพอร์ต')">โปรไฟล์</button>
    <a href="https://facebook.com/" target="_blank">
      <button class="fb">Facebook</button>
    </a>
  </div>

</div>

<!-- PROFILE -->
<div id="profileBox" class="profile"></div>

<script>
function showProfile(name, role, desc){
  document.getElementById("profileBox").style.display = "block";
  document.getElementById("profileBox").innerHTML = `
    <h2>${name}</h2>
    <p>ตำแหน่ง: ${role}</p>
    <p>${desc}</p>
  `;
}
</script>

</body>
</html>
