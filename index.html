<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

/* 🔥 Title */
h1 {
  margin-top: 40px;
  font-size: 60px;
  letter-spacing: 3px;
  text-shadow: 0 0 20px white, 0 0 40px purple;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px white; }
  to { text-shadow: 0 0 30px purple; }
}

/* 🔍 search */
.search {
  margin: 20px auto;
  width: 300px;
}

.search input {
  width: 100%;
  padding: 12px;
  border-radius: 20px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* 📦 grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 20px;
}

/* 🧑 card */
.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 20px purple;
  text-align: left;
  position: relative;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 0.6s forwards;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px #9333ea;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 👤 avatar */
.avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}

/* 📝 text */
.name {
  font-size: 18px;
  margin-top: 10px;
}

.fb {
  font-size: 13px;
  color: gray;
}

/* 🔗 facebook btn */
.fb-link {
  position: absolute;
  top: 15px;
  right: 15px;
  background: linear-gradient(45deg, #3b82f6, #9333ea);
  border-radius: 50%;
  padding: 10px;
  text-decoration: none;
  color: white;
}

/* ➕ form */
.form {
  margin-top: 20px;
}

input {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: purple;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>CERIDWEN</h1>

<!-- 🔍 search -->
<div class="search">
  <input id="search" placeholder="ค้นหาชื่อ..." oninput="filterData()">
</div>

<!-- ➕ form -->
<div class="form">
  <input id="name" placeholder="ชื่อ">
  <input id="fb" placeholder="Facebook link">
  <input id="img" placeholder="รูป (URL)">
  <br>
  <button onclick="addMember()">เพิ่ม</button>
</div>

<!-- 📦 list -->
<div class="grid" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
  authDomain: "ceridwen-7701e.firebaseapp.com",
  projectId: "ceridwen-7701e",
  storageBucket: "ceridwen-7701e.firebasestorage.app",
  messagingSenderId: "1016625949342",
  appId: "1:1016625949342:web:e11a12029ffae769f1298f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];

// ➕ เพิ่มข้อมูล
window.addMember = async () => {
  const name = nameInput.value;
  const fb = fbInput.value;
  const img = imgInput.value;

  if (!name) return alert("ใส่ชื่อก่อน!");

  await addDoc(collection(db, "members"), {
    name, fb, img,
    time: new Date()
  });

  nameInput.value = "";
  fbInput.value = "";
  imgInput.value = "";

  loadData();
};

// 📥 โหลดข้อมูล
async function loadData() {
  const q = query(collection(db, "members"), orderBy("time", "desc"));
  const snapshot = await getDocs(q);

  allData = [];
  snapshot.forEach(doc => allData.push(doc.data()));

  render(allData);
}

// 🎯 render
function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (i * 0.05) + "s";

    card.innerHTML = `
      <img class="avatar" src="${d.img || 'https://via.placeholder.com/60'}">
      <div class="name">${d.name}</div>
      <div class="fb">${d.fb || ''}</div>
      ${d.fb ? `<a class="fb-link" href="${d.fb}" target="_blank">f</a>` : ""}
    `;

    list.appendChild(card);
  });
}

// 🔍 search
window.filterData = () => {
  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(d =>
    d.name.toLowerCase().includes(keyword)
  );

  render(filtered);
};

loadData();
</script>

</body>
</html>
