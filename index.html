<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow-x: hidden;

  background: radial-gradient(circle at 20% 20%, #ff00ff33, transparent),
              radial-gradient(circle at 80% 30%, #00ffff33, transparent),
              black;
}

/* Neon */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(45deg,#ff00ff,#00ffff,#ff00ff);
  animation: neonMove 15s linear infinite;
  opacity: 0.05;
  z-index: -2;
}

@keyframes neonMove {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Title */
h1 {
  text-align: center;
  margin-top: 40px;
  font-size: 60px;
  text-shadow: 0 0 25px #ff00ff;
}

/* Login */
.login {
  text-align: center;
  margin: 20px;
}

.login button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg,#5865F2,#00c6ff);
  color: white;
  cursor: pointer;
}

/* Search */
.search {
  display: flex;
  justify-content: center;
}

.search input {
  width: 400px;
  padding: 12px;
  border-radius: 30px;
  border: none;
  background: #111;
  color: white;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 30px;
  padding: 40px;
}

/* Card */
.card {
  background: #111;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  transition: 0.2s;
  transform-style: preserve-3d;
  animation: slide 0.6s forwards;
  opacity: 0;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #ff00ff;
}

/* Avatar */
.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
}

/* Rank */
.rank {
  margin-top: 5px;
  padding: 5px 10px;
  border-radius: 20px;
  display: inline-block;
  font-size: 12px;
}

.rank.THEBOSS { background: gold; color:black; }
.rank.SUP { background: cyan; color:black; }
.rank.MEMBER { background: gray; }

/* Facebook */
.fb {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 15px;
  border-radius: 20px;
  background: #1877f2;
  color: white;
  text-decoration: none;
}

/* Animation */
@keyframes slide {
  from { transform: translateY(50px); opacity:0; }
  to { transform: translateY(0); opacity:1; }
}

/* Canvas */
canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>CERIDWEN</h1>

<div class="login">
  <button id="loginBtn">🔑 Login</button>
  <p id="user"></p>
</div>

<div class="search">
  <input id="search" placeholder="ค้นหาชื่อ...">
</div>

<div id="list" class="grid"></div>

<audio id="music" src="music.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
  authDomain: "ceridwen-7701e.firebaseapp.com",
  projectId: "ceridwen-7701e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* Login */
document.getElementById("loginBtn").onclick = async ()=>{
  const provider = new GoogleAuthProvider();
  const result = await signInWithPopup(auth, provider);
  document.getElementById("user").innerText = "👤 " + result.user.displayName;
};

/* Data */
let members = [];
const list = document.getElementById("list");
const search = document.getElementById("search");

onSnapshot(collection(db,"members"),snap=>{
  members=[];
  snap.forEach(doc=>members.push(doc.data()));
  render(members);
});

/* Render */
function render(data){
  list.innerHTML="";
  data.forEach(u=>{
    list.innerHTML += `
    <div class="card">
      <img src="${u.image||'https://via.placeholder.com/80'}" class="avatar">
      <h3>${u.name}</h3>
      <div class="rank ${u.rank}">${u.rank}</div>
      <a href="${u.facebook}" target="_blank" class="fb">Facebook</a>
    </div>`;
  });
  effect();
}

/* Search */
search.oninput=()=>{
  const k=search.value.toLowerCase();
  render(members.filter(m=>m.name.toLowerCase().includes(k)));
};

/* 3D */
function effect(){
  document.querySelectorAll(".card").forEach(c=>{
    c.onmousemove=e=>{
      const r=c.getBoundingClientRect();
      const x=e.clientX-r.left;
      const y=e.clientY-r.top;
      c.style.transform=`rotateX(${-(y/r.height-0.5)*20}deg) rotateY(${(x/r.width-0.5)*20}deg)`;
    };
    c.onmouseleave=()=>c.style.transform="";
  });
}

/* music */
document.body.onclick=()=>document.getElementById("music").play();
</script>

<!-- Stars -->
<script>
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let s=[];
for(let i=0;i<120;i++){
  s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
}

function d(){
  ctx.clearRect(0,0,c.width,c.height);
  s.forEach(p=>{
    p.y+=0.5;
    if(p.y>c.height)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(d);
}
d();
</script>

</body>
</html>
