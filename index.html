<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🌌 Particle background */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* 🧠 โลโก้ */
.logo {
  text-align:center;
  font-size:50px;
  margin-top:40px;
  animation: float 3s ease-in-out infinite, glow 2s infinite alternate;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}

@keyframes glow {
  from { text-shadow:0 0 10px #fff; }
  to { text-shadow:0 0 30px #8a2be2; }
}

/* 🧑‍🤝‍🧑 การ์ด */
.container {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:50px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:20px;
  text-align:center;
  width:150px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.1);
}

.card img {
  width:80px;
  border-radius:50%;
}

button {
  margin-top:10px;
  padding:5px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.fb {
  background:#1877f2;
  color:white;
}

/* 📦 popup */
.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) scale(0);
  background:#111;
  padding:30px;
  border-radius:20px;
  text-align:center;
  transition:0.3s;
  z-index:10;
  box-shadow:0 0 30px #8a2be2;
}

.popup img {
  width:100px;
  border-radius:50%;
  margin-bottom:10px;
}

.popup.active {
  transform:translate(-50%, -50%) scale(1);
}

/* ✨ เมาส์ glow */
.cursor {
  position:fixed;
  width:100px;
  height:100px;
  background:radial-gradient(circle, rgba(138,43,226,0.5), transparent);
  pointer-events:none;
  border-radius:50%;
  transform:translate(-50%, -50%);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="cursor" id="cursor"></div>

<h1 class="logo">CERIDWEN</h1>

<div class="container">

  <div class="card">
    <img src="https://i.pravatar.cc/100?img=1">
    <h3>Bank</h3>
    <button onclick="openProfile('Bank','Leader','นักรบแห่ง CERIDWEN','https://i.pravatar.cc/100?img=1')">โปรไฟล์</button>
    <a href="https://facebook.com" target="_blank">
      <button class="fb">Facebook</button>
    </a>
  </div>

  <div class="card">
    <img src="https://i.pravatar.cc/100?img=2">
    <h3>Mix</h3>
    <button onclick="openProfile('Mix','Support','สายซัพโคตรโหด','https://i.pravatar.cc/100?img=2')">โปรไฟล์</button>
    <a href="https://facebook.com" target="_blank">
      <button class="fb">Facebook</button>
    </a>
  </div>

</div>

<!-- 📦 Popup -->
<div id="popup" class="popup" onclick="closeProfile()"></div>

<!-- 🔊 เพลง -->
<audio id="bgmusic" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* 🎵 เล่นเพลงเนียน */
document.body.addEventListener("click", () => {
  document.getElementById("bgmusic").play();
});

/* 📦 popup */
function openProfile(name, role, desc, img) {
  const popup = document.getElementById("popup");
  popup.innerHTML = `
    <img src="${img}">
    <h2>${name}</h2>
    <p>${role}</p>
    <p>${desc}</p>
  `;
  popup.classList.add("active");
}

function closeProfile() {
  document.getElementById("popup").classList.remove("active");
}

/* ✨ เมาส์ glow */
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* 🌌 particle */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:Math.random()-0.5,
    dy:Math.random()-0.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
