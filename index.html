<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>CERIDWEN</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* Title */
h1 {
  text-align: center;
  margin-top: 40px;
  font-size: 60px;
  color: white;
  text-shadow: 0 0 20px purple;
}

/* Search */
.search {
  display: flex;
  justify-content: center;
  margin: 30px;
}

.search input {
  width: 400px;
  padding: 12px;
  border-radius: 30px;
  border: none;
  outline: none;
  background: #111;
  color: white;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 30px;
  padding: 40px;
}

/* Card */
.card {
  background: #111;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,0,255,0.2);
  transition: 0.3s;
  animation: float 3s ease-in-out infinite;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px purple;
}

.avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 10px;
}

/* Floating animation */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* Stars background */
canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>CERIDWEN</h1>

<div class="search">
  <input type="text" id="search" placeholder="ค้นหาชื่อสมาชิก...">
</div>

<div id="member-list" class="grid"></div>

<!-- เพลง -->
<audio id="bgmusic" src="music.mp3" loop></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

/* Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyCr42iK2m6dwxqO2ZEFTIicDSWawb8m5ck",
  authDomain: "ceridwen-7701e.firebaseapp.com",
  projectId: "ceridwen-7701e",
  storageBucket: "ceridwen-7701e.firebasestorage.app",
  messagingSenderId: "1016625949342",
  appId: "1:1016625949342:web:e11a12029ffae769f1298f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("member-list");
const searchInput = document.getElementById("search");

let members = [];

/* 🔥 realtime update */
onSnapshot(collection(db, "members"), (snapshot) => {
  members = [];
  snapshot.forEach(doc => members.push(doc.data()));
  render(members);
});

/* render */
function render(data) {
  container.innerHTML = "";

  data.forEach(user => {
    container.innerHTML += `
      <div class="card">
        <img src="${user.image || 'https://via.placeholder.com/80'}" class="avatar">
        <h3>${user.name}</h3>
        <a href="${user.facebook}" target="_blank">Facebook</a>
      </div>
    `;
  });
}

/* search */
searchInput.addEventListener("input", () => {
  const keyword = searchInput.value.toLowerCase();
  const filtered = members.filter(m => m.name.toLowerCase().includes(keyword));
  render(filtered);
});

/* autoplay music */
document.body.onclick = () => {
  document.getElementById("bgmusic").play();
};
</script>

<!-- ✨ ดาวพื้นหลัง -->
<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<100;i++){
  stars.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    s.y += 0.5;
    if(s.y > canvas.height) s.y = 0;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
